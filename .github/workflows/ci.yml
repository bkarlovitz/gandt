name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: ${{ matrix.os }} / Go ${{ matrix.go-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        go-version:
          - 1.25.x
          - 1.26.x

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download modules
        run: go mod download

      - name: Check formatting
        run: |
          go fmt ./...
          git diff --exit-code

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Check static binary build
        env:
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags "-s -w -X main.version=ci" ./cmd/gandt
